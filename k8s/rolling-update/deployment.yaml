apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-app
  namespace: aceest-devops
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: aceest-fitness-app
  template:
    metadata:
      labels:
        app: aceest-fitness-app
    spec:
      containers:
        - name: aceest-fitness-app
          image: nandhiyan/aceest-fitness-gym:v2.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.1.0"
            - name: DEPLOYMENT_STRATEGY
              value: "rolling-update"
            - name: DEPLOYMENT_COLOR
              value: "rolling"
            - name: RELEASE_LABEL
              value: "Rolling Update Release"