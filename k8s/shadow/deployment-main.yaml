apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow-main
  namespace: aceest-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-shadow-app
      track: main
  template:
    metadata:
      labels:
        app: aceest-shadow-app
        track: main
    spec:
      containers:
        - name: app
          image: nandhiyan/aceest-fitness-gym:v2.3.0
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.3.0"
            - name: DEPLOYMENT_STRATEGY
              value: "shadow"
            - name: DEPLOYMENT_COLOR
              value: "main"
            - name: RELEASE_LABEL
              value: "Main Stable"