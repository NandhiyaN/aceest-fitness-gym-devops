apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow-copy
  namespace: aceest-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-shadow-app
      track: shadow
  template:
    metadata:
      labels:
        app: aceest-shadow-app
        track: shadow
    spec:
      containers:
        - name: app
          image: nandhiyan/aceest-fitness-gym:v2.4.0
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.4.0"
            - name: DEPLOYMENT_STRATEGY
              value: "shadow"
            - name: DEPLOYMENT_COLOR
              value: "shadow"
            - name: RELEASE_LABEL
              value: "Shadow Testing"