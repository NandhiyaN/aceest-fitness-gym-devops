apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  namespace: aceest-devops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-canary-app
      track: stable
  template:
    metadata:
      labels:
        app: aceest-canary-app
        track: stable
    spec:
      containers:
        - name: aceest-fitness-app
          image: nandhiyan/aceest-fitness-gym:v2.2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.2.0"
            - name: DEPLOYMENT_STRATEGY
              value: "canary"
            - name: DEPLOYMENT_COLOR
              value: "stable"
            - name: RELEASE_LABEL
              value: "Stable Release"