apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-app
  namespace: aceest-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness-app
  template:
    metadata:
      labels:
        app: aceest-fitness-app
    spec:
      containers:
        - name: aceest-fitness-app
          image: nandhiyan/aceest-fitness-gym:v2.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.0.0"
            - name: DEPLOYMENT_STRATEGY
              value: "base-kubernetes"
            - name: DEPLOYMENT_COLOR
              value: "baseline"