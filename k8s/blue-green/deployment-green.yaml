apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
  namespace: aceest-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness-app
      version: green
  template:
    metadata:
      labels:
        app: aceest-fitness-app
        version: green
    spec:
      containers:
        - name: aceest-fitness-app
          image: nandhiyan/aceest-fitness-gym:v2.2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.2.0"
            - name: DEPLOYMENT_STRATEGY
              value: "blue-green"
            - name: DEPLOYMENT_COLOR
              value: "green"
            - name: RELEASE_LABEL
              value: "Green New Release"