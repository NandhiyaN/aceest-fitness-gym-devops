apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-ab-b
  namespace: aceest-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab-app
      version: b
  template:
    metadata:
      labels:
        app: aceest-ab-app
        version: b
    spec:
      containers:
        - name: app
          image: nandhiyan/aceest-fitness-gym:v2.5.0
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v2.5.0"
            - name: DEPLOYMENT_STRATEGY
              value: "ab-testing"
            - name: DEPLOYMENT_COLOR
              value: "B"
            - name: RELEASE_LABEL
              value: "Version B"