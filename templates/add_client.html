{% extends "base.html" %}

{% block content %}
<h2>Add Client</h2>

<form method="POST">
    <label for="name">Client Name</label>
    <input type="text" id="name" name="name" required>

    <label for="age">Age</label>
    <input type="number" id="age" name="age">

    <label for="height">Height (cm)</label>
    <input type="number" step="0.1" id="height" name="height">

    <label for="weight">Weight (kg)</label>
    <input type="number" step="0.1" id="weight" name="weight">

    <label for="membership_status">Membership Status</label>
    <select id="membership_status" name="membership_status">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
        <option value="Expired">Expired</option>
    </select>

    <label for="membership_end">Membership End Date</label>
    <input type="date" id="membership_end" name="membership_end">

    <button type="submit">Save Client</button>
</form>
{% endblock %}
